# See docs at: https://mystmd.org/guide/frontmatter
version: 1
extends:
  - https://raw.githubusercontent.com/myst-contrib/myst-contrib.github.io/main/docs/footer.yml
project:
  id: myst-iconify
  title: myst-iconify
  github: https://github.com/choldgraf/myst-iconify
  plugins:
    - ../src/index.mjs
    # This is for demo-ing how a different plugin could use this plugin
    - ./plugins/check-cross-plugin.mjs
    - https://raw.githubusercontent.com/jupyter-book/myst-plugins/main/plugins/demo/src/index.mjs

  toc:
    - file: index.md
    - file: usage.md
    - file: plugins.md

site:
  options:
    logo_text: myst-iconify
  template: book-theme
  parts:
    navbar_end: parts/navbar_end.md
    footer: |
      Part of [MyST Community Contributions](https://contrib.mystmd.org) - community plugins, themes, and templates for the [MyST Document Engine](https://mystmd.org).
